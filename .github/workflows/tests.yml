# .github/workflows/tests.yml
# This file tells GitHub Actions what to do on every push

name: Playwright Tests

on:
  push:                    # run when you push code
    branches: [ main ]
  pull_request:            # run when you make a pull request
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest   # run on a Linux machine in the cloud

    steps:
      # Step 1: Get your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Install Playwright browsers
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      # Step 5: Run tests
      - name: Run tests
        run: pytest tests/ -v

      # Step 6: Upload HTML report as artifact
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()           # upload even if tests fail!
        with:
          name: test-report
          path: reports/